<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> CSS Buttons </title>

<body style="background-color:powderblue;"></body>

<style>
  .uberrequest-btn {
    background-color: black;
    color: white;
    border: none;
    height: 40px;
    width: 110px;
    cursor: pointer;
    transition: opacity 0.50s;
  }
  
  .uberrequest-btn:hover {
    opacity: 0.7;
  }

 .amazonaddtocart-btn {
    cursor: pointer;
    border: none;
    background-color: rgb(255, 216, 20);
    width: 140px;
    height: 30px;
    border-radius: 15px;
    transition: background-color 0.50s;
  }
  
  .amazonaddtocart-btn:hover {
    background-color: rgb(245, 205, 3);
  }

.githubsignup-btn {
    background-color: rgb(46, 164, 79);
    color: white;
    border: none;
    height: 40px;
    width: 90px;
    font-weight: bold;
    font-size: 15px;
    border-radius: 6px;
    cursor: pointer;
  }

.githubsignup-btn:hover {
  box-shadow: 0px 5px 8px rgba(0, 0, 0, 0.3);
  text-decoration: none;
}
  
  .butstrapgs-btn {
    background-color: rgb(121, 82, 179);
    border-radius: 4px;
    cursor: pointer;
    border: none;
    margin: 0px 5px;
    color: white;
    height: 40px;
    width: 110px;
    font-weight: bold;
    transition: background-color 0.5s;
  }
  
  .butstrapgs-btn:hover {
    background-color: rgb(87, 57, 130);
  }
  
  .butstrapdl-btn {
    background-color: white;
    color: rgb(108, 117, 125);
    border: 1px solid rgb(108, 117, 125);
    height: 40px;
    width: 100px;
    font-weight: bold;
    border-radius: 4px;
    cursor: pointer;
    margin: 0px 5px;

    transition: background-color 0.5s;
  }

.butstrapdl-btn:hover {
    background-color: rgb(108, 117, 125);
    color: white;
  }

  .lkinapply-btn {
    background-color: rgb(10, 102, 194);
    color: white;
    border: none;
    border-radius: 18px;
    padding-top: 10px;
    padding-bottom: 10px;
    padding-left: 15px;
    padding-right: 15px;
    font-weight: bold;
    display: inline-block;
    cursor: pointer;
  }

  .lkinapply-btn:hover {
    background-color: rgb(2, 55, 122);
  }

  .lksave-btn {
    background-color: white;
    color: rgb(10, 102, 194);
    border: 1px solid rgb(10, 102, 194);
    border-radius: 20px;
    padding-top: 10px;
    padding-bottom: 10px;
    padding-left: 20px;
    padding-right: 20px;
    cursor: pointer;
    font-weight: bold;
    font-size: 15px;
  }

   .lksave-btn:hover {
    background-color: rgb(221, 236, 253) ;
    border-style: solid;
    border-width: 2px;
  }

</style>

</head>

<body>

    <button class='uberrequest-btn'>
        Request Now
    </button>    

    <button class='amazonaddtocart-btn'>
        Add to Cart
    </button>

    <button class='githubsignup-btn'>
        Sign up
    </button>

    <button class='butstrapgs-btn'>
        Get Started
    </button>

    <button class='butstrapdl-btn'>
        Download
    </button>

   <button class='lkinapply-btn'>
        Apply on company website
    </button>

   <button class='lksave-btn'>
        Save
    </button>

</body>
</html>
