<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Activity 2 </title>

<body style="background-color:powderblue;"></body>

<style>
  .uberrequest-btn {
    background-color: black;
    color: white;
    border: none;
    height: 40px;
    width: 110px;
    cursor: pointer;
  }

 .amazonaddtocart-btn {
    cursor: pointer;
    border: none;
    background-color: rgb(255, 216, 20);
    width: 140px;
    height: 30px;
    border-radius: 15px;
  }

.githubsignup-btn {
    background-color: rgb(46, 164, 79);
    color: white;
    border: none;
    height: 40px;
    width: 90px;
    font-weight: bold;
    font-size: 15px;
    border-radius: 6px;
    cursor: pointer;
  }

  .butstrapgs-btn {
    background-color: rgb(121, 82, 179);
    border-radius: 4px;
    cursor: pointer;
    border: none;
    margin: 0px 5px;
    color: white;
    height: 40px;
    width: 110px;
    font-weight: bold;
  }
  
  .butstrapdl-btn {
    background-color: white;
    color: rgb(108, 117, 125);
    border: 1px solid rgb(108, 117, 125);
    height: 40px;
    width: 100px;
    font-weight: bold;
    border-radius: 4px;
    cursor: pointer;
    margin: 0px 5px;
  }

  .lkinapply-btn {
    background-color: rgb(10, 102, 194);
    color: white;
    border: none;
    border-radius: 18px;
    padding-top: 10px;
    padding-bottom: 10px;
    padding-left: 15px;
    padding-right: 15px;
    font-weight: bold;
    display: inline-block;
    cursor: pointer;
  }

  .lksave-btn {
    background-color: white;
    color: rgb(10, 102, 194);
    border: 1px solid rgb(10, 102, 194);
    border-radius: 20px;
    padding-top: 10px;
    padding-bottom: 10px;
    padding-left: 20px;
    padding-right: 20px;
    cursor: pointer;
    font-weight: bold;
    font-size: 15px;
  }

</style>

</head>

<body>

    <button class='uberrequest-btn'>
        Request Now
    </button>    

    <button class='amazonaddtocart-btn'>
        Add to Cart
    </button>

    <button class='githubsignup-btn'>
        Sign up
    </button>

    <button class='butstrapgs-btn'>
        Get Started
    </button>

    <button class='butstrapdl-btn'>
        Download
    </button>

   <button class='lkinapply-btn'>
        Apply on company website
    </button>

   <button class='lksave-btn'>
        Save
    </button>

</body>
</html>
